<!DOCTYPE html>
<html>
<head>
  <title>SmartTravel Settings</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 30px; background: #f9fafb; color: #111827; max-width: 500px; margin: 0 auto; }
    h1 { font-size: 24px; color: #4F46E5; margin-top: 0; }
    .card { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e5e7eb; }
    label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
    .hint { font-size: 12px; color: #6b7280; margin-bottom: 20px; }
    .badge { display: inline-flex; align-items: center; gap: 6px; background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; border-radius: 6px; padding: 6px 12px; font-size: 13px; font-weight: 600; margin-bottom: 20px; }
    .divider { border: none; border-top: 1px solid #e5e7eb; margin: 24px 0; }
    button { background: #f3f4f6; color: #374151; padding: 10px 16px; border: 1px solid #d1d5db; border-radius: 6px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #fee2e2; color: #b91c1c; border-color: #fca5a5; }
    #cache-status { margin-left: 12px; font-size: 14px; display: inline-block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>SmartTravel Settings</h1>
    <div class="badge">&#10003; Powered by SmartTravel API — no key required</div>
    <div class="hint">AI-powered insights are provided centrally. Your trip data is never stored on our servers.</div>

    <hr class="divider">

    <label>Cache</label>
    <div class="hint">Clears all locally cached trip insights. Next search will re-fetch from Claude.</div>
    <button id="clear-cache">Clear Cached Insights</button>
    <span id="cache-status"></span>
  </div>
  <script src="options.js"></script>
</body>
</html>
