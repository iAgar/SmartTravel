<!DOCTYPE html>
<html>
<head>
  <title>SmartTravel Settings</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 30px; background: #f9fafb; color: #111827; max-width: 500px; margin: 0 auto; }
    h1 { font-size: 24px; color: #4F46E5; margin-top: 0; }
    .card { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e5e7eb; }
    label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
    input[type="password"] { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; box-sizing: border-box; outline: none; transition: border-color 0.2s; }
    input[type="password"]:focus { border-color: #4F46E5; }
    .hint { font-size: 12px; color: #6b7280; margin-bottom: 20px; }
    button { background: #4F46E5; color: white; padding: 10px 16px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #4338CA; }
    button.danger { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }
    button.danger:hover { background: #fee2e2; color: #b91c1c; border-color: #fca5a5; }
    #status { margin-left: 12px; font-size: 14px; display: inline-block; }
    .divider { border: none; border-top: 1px solid #e5e7eb; margin: 24px 0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>SmartTravel Settings</h1>
    <label for="apiKey">Anthropic API Key</label>
    <div class="hint">Required for intelligent travel insights. Get one from console.anthropic.com.</div>
    <input type="password" id="apiKey" placeholder="sk-ant-...">
    <br><br>
    <button id="save">Save Settings</button>
    <span id="status"></span>
    <hr class="divider">
    <label>Cache</label>
    <div class="hint">Clears all locally cached trip insights. Next search will re-fetch from Claude.</div>
    <button id="clear-cache" class="danger">Clear Cached Insights</button>
    <span id="cache-status"></span>
  </div>
  <script src="options.js"></script>
</body>
</html>
